services:
  postgres:
    image: postgres:17
    container_name: pyrobot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pyrobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pyrobot_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-pyrobot}
    ports:
      - "5432:5432"
    volumes:
      - pyrobot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pyrobot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pyrobot_pg_data: